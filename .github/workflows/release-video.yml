name: Release Video

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 2.1.0). Leave empty to auto-detect from tag.'
        required: false
      no_narration:
        description: 'Skip TTS narration'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate-video:
    name: Generate Release Video
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history needed for changelog parsing

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev

      - name: Install Python dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          pip install manim edge-tts

      - name: Extract version from tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "ver=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "ver=${TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Generate release video
        run: |
          NARRATION_FLAG=""
          if [ "${{ github.event.inputs.no_narration }}" = "true" ]; then
            NARRATION_FLAG="--no-narration"
          fi

          python -c "
          from eostudio.core.video.release_video import (
              ChangelogParser, ReleaseVideoConfig, ReleaseVideoGenerator,
          )

          parser = ChangelogParser()
          try:
              changelog = parser.parse_latest_release()
          except RuntimeError:
              # Fallback: create minimal changelog if < 2 tags
              from eostudio.core.video.release_video import ReleaseChangelog
              changelog = ReleaseChangelog(
                  version='${{ steps.version.outputs.ver }}',
                  previous_version='0.0.0',
                  date='$(date +%Y-%m-%d)',
              )

          config = ReleaseVideoConfig(
              version='${{ steps.version.outputs.ver }}',
              product_name='EoStudio',
              tagline='Design Everything.',
              changelog=changelog,
              output_dir='./release-artifacts/video',
              include_narration=${{ github.event.inputs.no_narration != 'true' }},
          )

          gen = ReleaseVideoGenerator(config)
          result = gen.generate()

          print(f'Video: {result[\"final_video_path\"]}')
          print(f'Manifest: {result[\"manifest\"]}')
          "

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-video-${{ steps.version.outputs.tag }}
          path: |
            release-artifacts/video/*.mp4
            release-artifacts/video/release_video_manifest.json
          retention-days: 90

      - name: Attach video to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Wait for the release to be created by release.yml
          sleep 10

          # Find the video file
          VIDEO=$(find release-artifacts/video -name "*.mp4" -path "*release*" | head -1)
          if [ -z "$VIDEO" ]; then
            VIDEO=$(find release-artifacts/video -name "*.mp4" | head -1)
          fi

          if [ -n "$VIDEO" ]; then
            echo "Uploading $VIDEO to release ${{ steps.version.outputs.tag }}"
            gh release upload "${{ steps.version.outputs.tag }}" "$VIDEO" \
              --clobber 2>/dev/null || echo "Release not found yet — video saved as artifact"
          else
            echo "No video file found to upload"
          fi
